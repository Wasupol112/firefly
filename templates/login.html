{% extends "base.html" %}

{% block content %}

<style>

.hero{
max-width:560px;
margin:auto;
background:white;
padding:55px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
transition:0.25s;
}

.hero:hover{
transform:translateY(-4px);
}

/* Title */

.hero h1{
font-size:36px;
color:#0077cc;
margin-bottom:25px;
font-weight:600;
}

/* Labels */

.hero label{
color:#333;
font-size:18px;
font-weight:500;
}

/* Inputs */

input{
width:100%;
padding:14px;
border:1px solid #dcdcdc;
border-radius:8px;
margin-top:6px;
margin-bottom:22px;
font-size:16px;
background:#fafafa;
color:#333;
}

input:focus{
outline:none;
border-color:#1fa3ff;
box-shadow:0 0 0 2px rgba(31,163,255,0.2);
}

/* Placeholder */

input::placeholder{
color:#8a8a8a;
}

/* Button */

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#0077cc;
color:white;
transition:0.25s;
font-weight:500;
}

.btn:hover{
background:#005fa3;
transform:translateY(-2px);
}

/* Signup text */

.signup-link{
margin-top:18px;
display:block;
color:#555;
font-size:16px;
}

.signup-link a{
color:#0077cc;
text-decoration:none;
font-weight:500;
}

.signup-link a:hover{
text-decoration:underline;
}

/* Error */

.error{
background:#ff4d4d;
color:white;
padding:12px;
border-radius:8px;
margin-bottom:20px;
font-size:15px;
}

/* Password eye */

.password-box{
position:relative;
}

.toggle{
position:absolute;
right:12px;
top:14px;
cursor:pointer;
color:#888;
font-size:18px;
}

.toggle:hover{
color:#0077cc;
}

</style>

<div class="hero">

<h1>Login</h1>

{% if error %}
<div class="error">
{{error}}
</div>
{% endif %}

<form method="POST">

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>

<div class="password-box">
<input id="password" type="password" name="password" required>
<span class="toggle" onclick="togglePassword()">👁</span>
</div>

<button class="btn" type="submit">Login</button>

</form>

<div class="signup-link">
Don't have an account? <a href="/signup">Sign Up</a>
</div>

</div>

<script>

function togglePassword(){

let pass = document.getElementById("password")

if(pass.type === "password"){
pass.type = "text"
}else{
pass.type = "password"
}

}

</script>

{% endblock %}
