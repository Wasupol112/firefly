<!DOCTYPE html>
<html>

<head>
<title>Detection Result</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
color:#333;
text-align:center;
margin-top:60px;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:650px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h2{
margin-bottom:10px;
}

.count{
font-size:32px;
margin-top:15px;
color:#2a7de1;
font-weight:bold;
}

video{
width:100%;
border-radius:10px;
margin-top:25px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

button{
padding:12px 24px;
margin:8px;
border:none;
border-radius:6px;
background:#2a7de1;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d5fb0;
}

</style>

</head>

<body>

<div class="container">

<h2>Firefly Detection Result</h2>

<div class="count">
Fireflies detected: {{count}}
</div>

<video controls>
    <source src="{{ url_for('processed_video', filename=video) }}" type="video/mp4">
</video>

<br><br>

<a href="/upload">
<button>Upload Another Video</button>
</a>

<br><br>

<a href="/dashboard">
<button>Back to Home</button>
</a>

</div>

</body>
</html>
