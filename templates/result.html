{% extends "base.html" %}

{% block content %}

<style>

.result-wrapper{
display:flex;
justify-content:center;
align-items:center;
min-height:70vh;
}

.result-card{
background:white;
padding:60px 50px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;

max-width:650px;
width:100%;
}

.result-title{
font-size:26px;
margin-bottom:25px;
}

.result-count{
font-size:48px;
color:#2a7de1;
font-weight:600;
margin-bottom:40px;
}

.result-buttons{
display:flex;
flex-direction:column;
gap:15px;
align-items:center;
}

.result-btn{
display:inline-block;
padding:12px 28px;
border-radius:8px;
background:#2a7de1;
color:white;
text-decoration:none;
font-size:16px;
transition:0.2s;
}

.result-btn:hover{
background:#1d5fb0;
}

/* mobile */

@media (max-width:600px){

.result-card{
padding:35px 25px;
}

.result-title{
font-size:22px;
}

.result-count{
font-size:34px;
}

.result-btn{
width:100%;
max-width:200px;
}

}

</style>

<div class="result-wrapper">

<div class="result-card">

<div class="result-title">
Firefly Detection Result
</div>

<div class="result-count">
Fireflies detected: {{ count }}
</div>

<div class="result-buttons">

<a href="/upload" class="result-btn">
Upload Another Video
</a>

<a href="/dashboard" class="result-btn">
Back to Home
</a>

</div>

</div>

</div>

{% endblock %}
