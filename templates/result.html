<!DOCTYPE html>

<html>

<head>
<title>Detection Result</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fb;
color:#333;
text-align:center;
margin-top:60px;
}

.container{
background:white;
padding:50px;
border-radius:12px;
width:600px;
margin:auto;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

h2{
margin-bottom:15px;
}

.count{
font-size:40px;
margin-top:20px;
color:#2a7de1;
font-weight:bold;
}

button{
padding:12px 24px;
margin:10px;
border:none;
border-radius:6px;
background:#2a7de1;
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d5fb0;
}

</style>

</head>

<body>

<div class="container">

<h2>Firefly Detection Result</h2>

<div class="count">
Fireflies detected: {{count}}
</div>

<br><br>

<a href="/upload">
<button>Upload Another Video</button>
</a>

<br>

<a href="/dashboard">
<button>Back to Home</button>
</a>

</div>

</body>
</html>
